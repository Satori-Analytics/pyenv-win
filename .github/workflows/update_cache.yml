name: Update cached versions

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * 5"

env:
  DEPLOY_USER: "Nikolas Demiridis"
  DEPLOY_EMAIL: "nikolas.demiridis@satorianalytics.com"
  DEPLOY_BRANCH: master

jobs:
  update_cache:
    runs-on: windows-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
      - name: Scrape and update versions cache
        shell: pwsh
        run: |
          $env:PYENV_HOME = "${{ github.workspace }}/pyenv-win"
          ./pyenv-win/bin/pyenv.ps1 update-ci --verbose
      - name: Check for changes
        id: changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            git reset HEAD
          fi
      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: |
          $versionFile = ".version"
          $current = (Get-Content $versionFile).Trim()
          $parts = $current -split '\.'
          $parts[2] = [int]$parts[2] + 1
          $newVersion = $parts -join '.'
          Set-Content -Path $versionFile -Value $newVersion -NoNewline
          Write-Host "Bumped version: $current -> $newVersion"
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_ENV
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "${{ env.DEPLOY_USER }}"
          git config user.email "${{ env.DEPLOY_EMAIL }}"
          git add -A
          git commit -m "chore: update cached versions to v${{ env.NEW_VERSION }}"
          git push origin ${{ env.DEPLOY_BRANCH }}
      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        run: |
          gh release create "v${{ env.NEW_VERSION }}" \
            --target ${{ env.DEPLOY_BRANCH }} \
            --title "v${{ env.NEW_VERSION }}" \
            --notes "Automated release — updated Python versions cache." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
