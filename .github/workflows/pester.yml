name: Pester

on:
  push:
    branches:
      - '**'
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  test:
    name: Pester tests
    runs-on: windows-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -MinimumVersion 5.7 -Force -Scope CurrentUser
          Import-Module Pester

      - name: Run tests
        shell: pwsh
        run: ./tests/Run-Tests.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/TestResults.xml
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tests/coverage.xml
          if-no-files-found: warn
