name: Publish release

on:
  workflow_run:
    workflows: ["Update versions", "Create release"]
    types: [completed]
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: >
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.PYENV_WIN_PAT }}
      - name: Get version
        id: version
        run: echo "version=$(cat .version | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Build release zip
        run: |
          zip -r pyenv-win.zip \
            pyenv-win/ \
            .gitignore .version LICENSE README.md \
            -x "pyenv-win/__pycache__/*"
      - name: Upload zip to release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release upload "$TAG" pyenv-win.zip --clobber || echo "No release found for $TAG, skipping upload."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
      - name: Update release notes
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          gh release edit "$TAG" --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Update changelog file
        run: |
          { head -7 docs/changelog.md; echo; cat RELEASE_NOTES.md; tail -n +8 docs/changelog.md; } > /tmp/changelog.md
          mv /tmp/changelog.md docs/changelog.md
      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update changelog for v${{ steps.version.outputs.version }}"
            git push origin master
          fi
