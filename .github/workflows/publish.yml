name: Publish Release Zip

on:
  release:
    types: [created]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - name: Build release zip
        run: |
          zip -r pyenv-win.zip pyenv-win/ .version -x "pyenv-win/__pycache__/*"
      - name: Upload zip to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" pyenv-win.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
