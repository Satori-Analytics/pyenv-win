name: Update versions

on:
  workflow_dispatch:
  schedule:
    - cron: "5 0 * * 5"

env:
  DEPLOY_BRANCH: master

jobs:
  update_versions:
    runs-on: windows-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PYENV_WIN_PAT }}
      - name: Scrape and update versions cache
        shell: pwsh
        run: |
          $env:PYENV_HOME = "${{ github.workspace }}/pyenv-win"
          ./pyenv-win/bin/pyenv.ps1 update-ci --verbose
      - name: Check for changes
        id: changes
        shell: pwsh
        run: |
          git add -A
          git diff --staged --quiet
          if ($LASTEXITCODE -eq 0) {
            'changed=false' >> $env:GITHUB_OUTPUT
          } else {
            'changed=true' >> $env:GITHUB_OUTPUT
            git reset HEAD
          }
      - name: Bump patch version
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: |
          $versionFile = ".version"
          $current = (Get-Content $versionFile).Trim()
          $parts = $current -split '\.'
          $parts[2] = [int]$parts[2] + 1
          $newVersion = $parts -join '.'
          Set-Content -Path $versionFile -Value $newVersion -NoNewline
          Write-Host "Bumped version: $current -> $newVersion"
          echo "NEW_VERSION=$newVersion" >> $env:GITHUB_ENV
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update cached versions to v${{ env.NEW_VERSION }}"
          git push origin ${{ env.DEPLOY_BRANCH }}
      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true'
        shell: pwsh
        run: |
          gh release create "v${{ env.NEW_VERSION }}" `
            --target ${{ env.DEPLOY_BRANCH }} `
            --title "v${{ env.NEW_VERSION }}" `
            --notes "Automated release — updated Python versions cache." `
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
